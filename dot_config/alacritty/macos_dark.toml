[colors.primary]
background = '#1E1E1E'
foreground = '#DFDFE0'  # Slightly off-white for better eye comfort

# Normal colors (Dark Default values - more muted)
[colors.normal]
black = '#2D2D2D'
red = '#FF5F57'        # Closer to macOS red
green = '#28C840'      # More muted green
yellow = '#FEBC2E'     # More muted yellow
blue = '#4AA9FF'       # Softer blue
magenta = '#BD5BF3'    # Softer magenta
cyan = '#5AC4FF'       # Softer cyan
white = '#989898'      # System gray

# Bright colors
[colors.bright]
black = '#666666'
red = '#FF6961'
green = '#32D74B'
yellow = '#FFD60A'
blue = '#0A84FF'
magenta = '#BF5AF2'
cyan = '#76D0F5'
white = '#FFFFFF'

# Dim colors (for better contrast in dark mode)
[colors.dim]
black = '#1E1E1E'
red = '#CC3629'
green = '#28AC3B'
yellow = '#CC9900'
blue = '#0066CC'
magenta = '#9933CC'
cyan = '#4D99B3'
white = '#666666'